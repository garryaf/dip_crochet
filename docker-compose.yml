# ============================================
# Cotcret — Docker Compose (App Only, DB from Neon)
# ============================================
# Usage: docker compose up -d --build

services:
  # Next.js Application (connects to Neon PostgreSQL)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cotcret-app
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgresql://neondb_owner:npg_JD80MwzoZtOf@ep-weathered-block-aq6vt62k-pooler.c-8.us-east-1.aws.neon.tech/crochet?sslmode=require&channel_binding=require
      - AUTH_SECRET=${AUTH_SECRET:-development-secret-change-in-production-min-32-chars}
      - AUTH_URL=http://localhost:3333
      - NEXT_PUBLIC_SITE_URL=http://localhost:3333
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
